name: mini_market
description: "سیستەمی بەڕێوەبردن و فرۆشتنی مارکێت گوڵینا."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  provider: ^6.1.5
  sqflite_common_ffi: ^2.4.0+3
  sqlite3_flutter_libs: any
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^11.0.2
  shared_preferences: ^2.5.5
  http: ^1.6.0
  intl: ^0.20.2
  fl_chart: ^1.2.0
  excel: ^4.0.6
  uuid: ^4.5.3
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  fonts:
    - family: Rabar
      fonts:
        - asset: assests/fonts/Rabar-Regular.ttf
        - asset: assests/fonts/Rabar-Medium.ttf
          weight: 500
        - asset: assests/fonts/Rabar-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: false
  ios: true
  web:
    generate: true
    image_path: "assets/branding/app_logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  macos:
    generate: true
    image_path: "assets/branding/app_logo.png"
  windows:
    generate: true
    image_path: "assets/branding/app_logo.png"
  image_path: "assets/branding/app_logo.png"
